<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Big Red Button</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-white text-black">
    <!-- Generator view (shown when no #audio=... is present) -->
    <main id="generatorView" class="min-h-screen flex items-center justify-center p-6">
      <div class="w-full max-w-2xl">
        <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight">The Big Red Button</h1>
        <p class="mt-4 text-xl sm:text-2xl leading-snug">
          Paste a Dropbox audio link. Tap Create Link.
        </p>

        <label for="sourceUrl" class="block mt-8 text-2xl font-bold">Audio link</label>
        <input
          id="sourceUrl"
          type="url"
          inputmode="url"
          autocomplete="off"
          spellcheck="false"
          placeholder="https://..."
          class="mt-3 w-full rounded-xl border-4 border-black px-5 py-4 text-2xl sm:text-3xl focus:outline-none focus:ring-0"
        />

        <button
          id="createLinkBtn"
          type="button"
          class="mt-6 w-full rounded-xl bg-black px-6 py-5 text-2xl sm:text-3xl font-extrabold text-white"
        >
          Create Link
        </button>

        <div id="generatedActions" class="mt-6 hidden" aria-live="polite">
          <label for="generatedLink" class="block text-2xl font-bold">Your play link</label>
          <input
            id="generatedLink"
            type="text"
            readonly
            class="mt-3 w-full rounded-xl border-4 border-black px-5 py-4 text-xl sm:text-2xl focus:outline-none focus:ring-0"
          />

          <div class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
            <button
              id="copyLinkBtn"
              type="button"
              class="w-full rounded-xl bg-black px-6 py-5 text-2xl sm:text-3xl font-extrabold text-white"
            >
              Copy Link
            </button>
            <button
              id="openLinkBtn"
              type="button"
              class="w-full rounded-xl bg-black px-6 py-5 text-2xl sm:text-3xl font-extrabold text-white"
            >
              Test Link
            </button>
          </div>

          <p id="copyStatus" class="mt-3 text-lg sm:text-xl font-bold hidden" role="status"></p>
        </div>

        <p id="generatorError" class="mt-4 text-xl font-bold text-red-700 hidden" role="alert"></p>
      </div>
    </main>

    <!-- Player view (shown when #audio=... is present) -->
    <main id="playerView" class="min-h-screen hidden items-center justify-center p-6">
      <div class="flex flex-col items-center justify-center">
        <button
          id="bigButton"
          type="button"
          class="relative h-[70vmin] w-[70vmin] max-h-[520px] max-w-[520px] rounded-full text-white text-5xl sm:text-6xl font-extrabold tracking-wide border-8 border-black bg-gradient-to-b from-red-500 to-red-700 shadow-2xl ring-4 ring-white focus:outline-none focus:ring-0"
          aria-label="Play audio"
        >
          <span aria-hidden="true" class="pointer-events-none absolute inset-6 rounded-full ring-4 ring-white/30"></span>
          <span aria-hidden="true" class="pointer-events-none absolute inset-10 rounded-full bg-white/10"></span>
          <span id="buttonIcon" aria-hidden="true" class="text-[18vmin] leading-none">▶</span>
          <span id="buttonSrLabel" class="sr-only">Tap to play or pause</span>
        </button>

        <p id="playerError" class="mt-6 text-xl sm:text-2xl font-extrabold text-black hidden" role="alert"></p>
      </div>

      <!-- Standard HTML5 audio element; kept out of sight to keep the UI to one button. -->
      <audio id="audio" preload="none"></audio>
      <div id="srStatus" class="sr-only" aria-live="polite"></div>
    </main>

    <script>
      function parseHashParams() {
        const raw = window.location.hash.replace(/^#/, "");
        return new URLSearchParams(raw);
      }

      function getAudioUrlFromHash() {
        const params = parseHashParams();
        const encoded = params.get("audio");
        if (!encoded) return null;
        try {
          const decoded = decodeURIComponent(encoded);
          return decoded.trim() || null;
        } catch {
          return null;
        }
      }

      function isProbablyUrl(value) {
        try {
          const url = new URL(value);
          return url.protocol === "https:" || url.protocol === "http:";
        } catch {
          return false;
        }
      }

      // Dropbox-only cleaner:
      // - www.dropbox.com/... -> dl.dropboxusercontent.com/...
      // - Preserve important params like rlkey; remove dl=...; force raw=1.
      function cleanShareLink(input) {
        let url;
        try {
          url = new URL(input);
        } catch {
          return input;
        }

        // Dropbox (already direct host)
        if (url.hostname.endsWith("dropboxusercontent.com")) {
          url.searchParams.delete("dl");
          if (url.searchParams.has("raw") === false) {
            url.searchParams.set("raw", "1");
          }
          url.hash = "";
          return url.toString();
        }

        // Dropbox (share host)
        if (url.hostname === "www.dropbox.com" || url.hostname === "dropbox.com") {
          url.hostname = "dl.dropboxusercontent.com";
          url.searchParams.delete("dl");
          if (url.searchParams.has("raw") === false) {
            url.searchParams.set("raw", "1");
          }
          url.hash = "";
          return url.toString();
        }

        return input;
      }

      function isDropboxUrl(urlString) {
        try {
          const u = new URL(urlString);
          return (
            u.hostname === "www.dropbox.com" ||
            u.hostname === "dropbox.com" ||
            u.hostname.endsWith("dropboxusercontent.com")
          );
        } catch {
          return false;
        }
      }

      function setOnlyView(view) {
        const generatorView = document.getElementById("generatorView");
        const playerView = document.getElementById("playerView");

        if (view === "player") {
          generatorView.classList.add("hidden");
          playerView.classList.remove("hidden");
          playerView.classList.add("flex");
        } else {
          playerView.classList.add("hidden");
          playerView.classList.remove("flex");
          generatorView.classList.remove("hidden");
        }
      }

      function setStatus(message) {
        document.getElementById("srStatus").textContent = message;
      }

      function render() {
        const audioUrl = getAudioUrlFromHash();
        const audioEl = document.getElementById("audio");
        const playerError = document.getElementById("playerError");
        const button = document.getElementById("bigButton");

        if (!audioUrl) {
          setOnlyView("generator");
          if (audioEl) {
            audioEl.pause();
            audioEl.removeAttribute("src");
            audioEl.load();
          }
          return;
        }

        setOnlyView("player");

        // If someone opens a link with a non-Dropbox #audio=..., fail clearly.
        if (!isDropboxUrl(audioUrl)) {
          if (playerError) {
            playerError.textContent = "Only Dropbox audio links are supported in this version.";
            playerError.classList.remove("hidden");
          }
          if (button) button.disabled = true;
          if (audioEl) {
            audioEl.pause();
            audioEl.removeAttribute("src");
            audioEl.load();
          }
          return;
        }

        if (playerError) {
          playerError.textContent = "";
          playerError.classList.add("hidden");
        }
        if (button) button.disabled = false;

        if (audioEl && audioEl.getAttribute("src") !== audioUrl) {
          audioEl.setAttribute("src", audioUrl);
          audioEl.load();
          setStatus("Audio ready");
        }
      }

      function initGenerator() {
        const input = document.getElementById("sourceUrl");
        const btn = document.getElementById("createLinkBtn");
        const errorEl = document.getElementById("generatorError");
        const actionsEl = document.getElementById("generatedActions");
        const linkEl = document.getElementById("generatedLink");
        const copyBtn = document.getElementById("copyLinkBtn");
        const openBtn = document.getElementById("openLinkBtn");
        const copyStatus = document.getElementById("copyStatus");

        let lastGeneratedUrl = "";

        function showError(msg) {
          errorEl.textContent = msg;
          errorEl.classList.remove("hidden");
        }

        function clearError() {
          errorEl.textContent = "";
          errorEl.classList.add("hidden");
        }

        function hideGeneratedActions() {
          actionsEl.classList.add("hidden");
          linkEl.value = "";
          lastGeneratedUrl = "";
          copyStatus.textContent = "";
          copyStatus.classList.add("hidden");
          copyStatus.classList.remove("text-red-700");
          copyStatus.classList.remove("text-black");
        }

        function setCopyStatus(message, isError) {
          copyStatus.textContent = message;
          copyStatus.classList.remove("hidden");
          copyStatus.classList.toggle("text-red-700", Boolean(isError));
          copyStatus.classList.toggle("text-black", !isError);
        }

        btn.addEventListener("click", () => {
          clearError();
          hideGeneratedActions();

          const raw = (input.value || "").trim();
          if (!raw) {
            showError("Please paste a link.");
            return;
          }
          if (!isProbablyUrl(raw)) {
            showError("That doesn’t look like a valid URL.");
            return;
          }

          if (!isDropboxUrl(raw)) {
            showError("Only Dropbox audio links are supported in this version.");
            return;
          }

          const cleaned = cleanShareLink(raw);
          const encoded = encodeURIComponent(cleaned);
          const hash = `#audio=${encoded}`;
          const fullUrl = `${window.location.origin}${window.location.pathname}${hash}`;

          lastGeneratedUrl = fullUrl;
          linkEl.value = fullUrl;
          actionsEl.classList.remove("hidden");
          linkEl.focus();
          linkEl.select();
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") btn.click();
        });

        input.addEventListener("input", () => {
          hideGeneratedActions();
          clearError();
        });

        copyBtn.addEventListener("click", async () => {
          if (!lastGeneratedUrl) return;
          try {
            if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
              await navigator.clipboard.writeText(lastGeneratedUrl);
            } else {
              const ta = document.createElement("textarea");
              ta.value = lastGeneratedUrl;
              ta.setAttribute("readonly", "");
              ta.style.position = "absolute";
              ta.style.left = "-9999px";
              document.body.appendChild(ta);
              ta.select();
              document.execCommand("copy");
              document.body.removeChild(ta);
            }
            setCopyStatus("Copied.", false);
          } catch {
            setCopyStatus("Could not copy. You can copy from the box above.", true);
          }
        });

        openBtn.addEventListener("click", () => {
          if (!lastGeneratedUrl) return;
          window.location.href = lastGeneratedUrl;
        });
      }

      function initPlayer() {
        const button = document.getElementById("bigButton");
        const icon = document.getElementById("buttonIcon");
        const audioEl = document.getElementById("audio");
        const playerError = document.getElementById("playerError");

        let isLoading = false;

        function syncButtonState() {
          const isPlaying = !audioEl.paused && !audioEl.ended;
          if (isLoading) {
            icon.textContent = "…";
            button.setAttribute("aria-label", "Loading audio");
          } else {
            icon.textContent = isPlaying ? "❚❚" : "▶";
            button.setAttribute("aria-label", isPlaying ? "Pause audio" : "Play audio");
          }

          // Darken button slightly while playing.
          button.classList.remove("from-red-500", "to-red-700", "from-red-600", "to-red-800");
          if (isPlaying) {
            button.classList.add("from-red-600", "to-red-800");
          } else {
            button.classList.add("from-red-500", "to-red-700");
          }
        }

        audioEl.addEventListener("error", () => {
          const code = audioEl.error ? audioEl.error.code : 0;
          console.error("Audio error", {
            code,
            error: audioEl.error,
            currentSrc: audioEl.currentSrc,
            src: audioEl.getAttribute("src"),
          });
          setStatus("Audio failed to load");
          if (playerError) {
            playerError.textContent = "Could not load audio.";
            playerError.classList.remove("hidden");
          }
          isLoading = false;
          syncButtonState();
        });

        audioEl.addEventListener("play", () => {
          isLoading = false;
          if (playerError) {
            playerError.textContent = "";
            playerError.classList.add("hidden");
          }
          syncButtonState();
        });
        audioEl.addEventListener("pause", () => {
          isLoading = false;
          syncButtonState();
        });
        audioEl.addEventListener("ended", () => {
          isLoading = false;
          syncButtonState();
        });

        button.addEventListener("click", async () => {
          const audioUrl = getAudioUrlFromHash();
          if (!audioUrl) return;

          // If the hash URL is unsupported, the renderer disables the button.
          if (!isDropboxUrl(audioUrl)) return;

          if (audioEl.getAttribute("src") !== audioUrl) {
            audioEl.setAttribute("src", audioUrl);
            audioEl.load();
          }

          try {
            if (audioEl.paused) {
              isLoading = true;
              if (playerError) {
                playerError.textContent = "";
                playerError.classList.add("hidden");
              }
              syncButtonState();
              await audioEl.play();
              setStatus("Playing");
            } else {
              audioEl.pause();
              setStatus("Paused");
            }
          } catch {
            setStatus("Unable to play audio");
            if (playerError) {
              playerError.textContent = "Could not play audio.";
              playerError.classList.remove("hidden");
            }
            isLoading = false;
          }

          syncButtonState();
        });

        syncButtonState();
      }

      window.addEventListener("hashchange", render);
      initGenerator();
      initPlayer();
      render();
    </script>
  </body>
</html>
